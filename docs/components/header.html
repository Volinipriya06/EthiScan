<header style="background: #14161d; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 0.75rem 2rem; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; width: 100%;">
    <div style="display: flex; align-items: center; gap: 0.75rem;">
        <div style="background: #4d61fc; color: #ffffff; font-weight: 800; font-size: 0.85rem; padding: 0.35rem 0.55rem; border-radius: 6px; letter-spacing: 0.05em;">ES</div>
        <span style="color: #ffffff; font-weight: 700; font-size: 1.15rem; letter-spacing: -0.02em;">EthiScan</span>
    </div>

    <div style="display: flex; gap: 1.5rem; align-items: center;">
        <a href="index.html" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#94a3b8'">Scan</a>
        <a href="dashboard.html" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#94a3b8'">Dashboard</a>
    </div>

    <div style="display: flex; align-items: center; gap: 1rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(255, 255, 255, 0.03); padding: 0.35rem 0.75rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.08);">
            <span style="display: inline-block; width: 6px; height: 6px; background-color: #10b981; border-radius: 50%;"></span>
            <span style="font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: lowercase;" id="navUserBadge">guest</span>
        </div>
        <button id="authActionBtn" style="background: transparent; border: 1px solid rgba(255, 255, 255, 0.15); color: #ffffff; padding: 0.35rem 0.9rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s;" onmouseover="this.style.borderColor='#4d61fc'; this.style.background='rgba(77, 97, 252, 0.1)'" onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.15)'; this.style.background='transparent'">Login</button>
    </div>
</header>
