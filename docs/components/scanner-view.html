<div id="barcode-scanner-container" class="hidden" style="margin-top: 30px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; position: relative; max-width: 600px; margin-left: auto; margin-right: auto;">
    <video id="scanner-video-element" style="width: 100%; height: auto; display: block;"></video>
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 40px solid rgba(0,0,0,0.6); box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
        <div style="width: 100%; height: 120px; border: 2px dashed var(--accent); border-radius: 4px;"></div>
    </div>
    <button class="btn" id="close-scanner-btn" style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8);">Cancel</button>
</div>
