<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthiScan - Create Account</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <h2>Create Your Account</h2>
        <p class="auth-subtitle">Set up your secure profile portal</p>
        <form id="registerForm">
            <div class="form-section-title">ACCOUNT INFORMATION</div>
            <div class="form-group">
                <label>FULL NAME</label>
                <input type="text" id="regName" placeholder="Vidhya Sri" required>
            </div>
            <div class="form-group">
                <label>EMAIL</label>
                <input type="email" id="regEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="regPassword" placeholder="Min 8 characters" required>
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">← Sign In</a></p>
            </div>
        </form>
    </div>
    <script src="js/loader.js"></script>
    <div id="toast"></div>
</body>
</html>
