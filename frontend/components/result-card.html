<div id="analysis-result-panel" class="hidden animate-fade" style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 32px; margin-top: 40px; position: relative;">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
            <p id="res-barcode" style="font-size: 11px; color: var(--text-muted); font-family: monospace; letter-spacing: 0.5px; margin-bottom: 4px;"></p>
            <h2 id="res-name" style="font-size: 36px; font-weight: 700; margin-bottom: 4px;"></h2>
            <p id="res-category" style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 16px;"></p>
            <div id="res-status-badge" style="display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 20px;"></div>
            <p id="res-description" style="color: var(--text-muted); font-size: 15px; line-height: 1.6; max-width: 700px; margin-bottom: 28px;"></p>
        </div>
        <div style="position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;">
            <svg style="width: 100%; height: 100%; transform: rotate(-90deg);">
                <circle cx="40" cy="40" r="34" stroke="#1c1c24" stroke-width="6" fill="transparent"/>
                <circle id="score-ring-fill" cx="40" cy="40" r="34" stroke="var(--green)" stroke-width="6" fill="transparent" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
            </svg>
            <div style="position: absolute; text-align: center;">
                <span id="score-ring-val" style="font-size: 22px; font-weight: 700; display: block; line-height: 1;"></span>
                <span style="font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Score</span>
            </div>
        </div>
    </div>

    <div style="border-top: 1px solid var(--border); padding-top: 24px; margin-bottom: 28px;">
        <h4 style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 12px;">Ethics Badges</h4>
        <div id="res-badges-container" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
    </div>

    <div style="border-top: 1px solid var(--border); padding-top: 24px;">
        <h4 style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 16px;">Greener Alternatives</h4>
        <div id="res-alternatives-container" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>
</div>
